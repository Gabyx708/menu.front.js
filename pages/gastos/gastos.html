<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="gastos.css">
    <title>Gastos</title>
</head>

<body>
    <header></header>

    <section>
        <div id="containder-gastos">
            <div id="selector-mes">
                <label for="mes">Seleccionar mes:</label>
                <select id="mes">
                    <option value="1">Enero</option>
                    <option value="2">Febrero</option>
                    <option value="3">Marzo</option>
                    <option value="4">Abril</option>
                    <option value="5">Mayo</option>
                    <option value="6">Junio</option>
                    <option value="7">Julio</option>
                    <option value="8">Agosto</option>
                    <option value="9">Septiembre</option>
                    <option value="10">Octubre</option>
                    <option value="11">Noviembre</option>
                    <option value="12">Diciembre</option>
                </select>
            </div>
            <div>
                <h2>GASTOS DEL MES</h2>
            </div>

            <div>
                <strong>MONTO TOTAL:</strong>
                <p id="monto-total">$ 99</p>
            </div>

            <div>
                <strong>MONTO A DESCONTAR:</strong>
                <p id="monto-descontar">$44</P>
            </div>

            <div id="container-num-pedidos">
                <div>
                    <strong>Pedidos completados:</strong>
                    <p id="cant-pedidos-completados">1</p>
                </div>

                <div>
                    <strong>Pedidos cancelados:</strong>
                    <p id="cant-pedidos-cancelados">1</p>
                </div>
            </div>

        </div>
    </section>

    <footer></footer>
</body>
<script src="/utils/agregarHeaderFooter.js" type="module"></script>
<script src="gastos.js" type="module"></script>

</html>
